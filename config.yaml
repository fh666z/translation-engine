# ============================================================================
# Translation Backend - Main Configuration (API/Engine)
# ============================================================================

provider_type: "ollama"  # "ollama" for local dev, "vertex_ai" for GCP

ollama:
  # Runtime translation model is loaded from config_translation.yaml -> defaults.translation_model
  # This block controls only Ollama transport/runtime parameters.
  base_url: "http://localhost:11434"
  temperature: 0.7
  streaming: true

vertex_ai:
  project_id: "YOUR_GCP_PROJECT_ID"
  location: "YOUR_VERTEX_REGION"
  # Runtime translation model is loaded from config_translation.yaml -> defaults.translation_model
  # Optional separate embedding model for context indexing (Vertex AI embeddings)
  embedding_model_id: "text-embedding-004"

app:
  name: "Translation Engine API"
  show_emojis: true

